name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
      - 'backup/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Tests
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing

  build-and-push-docker:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000

    env:
      TEST_TAG: localhost:5001/actions/commit-info-extractor:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver-opts: network=host

      - name: Build the Container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Run the Container
        env:
          INPUT_COMMIT_LIMIT: 10
          INPUT_EXTRACT_COMMAND: grep -oP \\bfix\\b
          INPUT_PRETTY: true
          INPUT_KEY_VARIABLE: extracted_info
        run: |
          docker run \
          --env INPUT_COMMIT_LIMIT="${{ env.INPUT_COMMIT_LIMIT }}" \
          --env INPUT_EXTRACT_COMMAND="${{ env.INPUT_EXTRACT_COMMAND }}" \
          --env INPUT_PRETTY="${{ env.INPUT_PRETTY }}" \
          --env INPUT_KEY_VARIABLE="${{ env.INPUT_KEY_VARIABLE }}" \
          --volume ${{ github.workspace }}:/usr/src \
          --rm ${{ env.TEST_TAG }}

  test-action:
    name: Test Extract Commit Action
    needs:
      - unit-test
      - build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: Test Local Action (Basic)
        id: extract_commit
        uses: ./
        with:
          commit_limit: 10
          extract_command: grep -oP \\bchore\\b
          pretty: true
          key_variable: environment

      - name: Print Basic Output
        run: |
          echo "Extracted variable: ${{ steps.extract_commit.outputs.key_variable }} = ${{ steps.extract_commit.outputs.value_variable }}"

      - name: Test Local Action (With fail_on_empty)
        id: extract_commit_fail
        uses: ./
        continue-on-error: true
        with:
          commit_limit: 10
          extract_command: grep -oP \\bnonexistentword\\b
          pretty: true
          key_variable: environment
          fail_on_empty: true

      - name: Print Fail Test Output
        run: |
          echo "Fail test status: ${{ steps.extract_commit_fail.outcome }}"

      - name: Test JSON Output Format
        id: json_format_test
        uses: ./
        with:
          commit_limit: 10
          extract_command: grep -oP \\bchore\\b
          pretty: true
          key_variable: json_result
          output_format: json

      - name: Print JSON Output
        run: |
          echo "JSON Output: ${{ steps.json_format_test.outputs.value_variable }}"
          echo "Type checking with jq:"
          echo '${{ steps.json_format_test.outputs.value_variable }}' | jq

      - name: Test CSV Output Format
        id: csv_format_test
        uses: ./
        with:
          commit_limit: 10
          extract_command: grep -oP \\bchore\\b
          pretty: true
          key_variable: csv_result
          output_format: csv

      - name: Print CSV Output
        run: |
          echo "CSV Output: ${{ steps.csv_format_test.outputs.value_variable }}"

      - name: Test Multiple Results
        id: multiple_results
        uses: ./
        with:
          commit_limit: 15
          extract_command: grep -oP '(?<=\s|^)[a-zA-Z]+(?=\s|$)' | head -n5
          pretty: true
          key_variable: multiple_words

      - name: Process Multiple Results
        run: |
          echo "Multiple results found: ${{ steps.multiple_results.outputs.value_variable }}"
          echo "Processing each result:"
          echo "${{ steps.multiple_results.outputs.value_variable }}" | while read -r word; do
            echo "  - Found word: $word"
          done

      - name: Test Complex Scenario
        id: complex_test
        uses: ./
        with:
          commit_limit: 15
          extract_command: grep -oP '(?<=\s|^)[a-zA-Z]+(?=\s|$)' | head -n5
          pretty: true
          key_variable: complex_result
          output_format: json

      - name: Process Complex Scenario Results
        run: |
          echo "Complex scenario results (JSON array):"
          echo "${{ steps.complex_test.outputs.value_variable }}"
          echo "Parsing JSON array elements:"
          echo '${{ steps.complex_test.outputs.value_variable }}' | jq -c '.[]' | while read -r item; do
            echo "  - JSON item: $item"
          done

      - name: Test Extract Pattern
        id: pattern_test
        uses: ./
        with:
          commit_limit: 10
          extract_pattern: '(feat|fix|chore|refactor|docs|ci|test)'
          pretty: true
          key_variable: pattern_result

      - name: Print Pattern Test Output
        run: |
          echo "Pattern result: ${{ steps.pattern_test.outputs.value_variable }}"
          echo "Match count: ${{ steps.pattern_test.outputs.match_count }}"

      - name: Test Commit Range
        id: range_test
        uses: ./
        with:
          commit_limit: 10
          commit_range: 'HEAD~3..HEAD'
          extract_pattern: '(feat|fix|chore|refactor|docs|ci|test)'
          pretty: true
          key_variable: range_result

      - name: Print Range Test Output
        run: |
          echo "Range result: ${{ steps.range_test.outputs.value_variable }}"
          echo "Match count: ${{ steps.range_test.outputs.match_count }}"

      - name: Test Debug Mode
        id: debug_test
        uses: ./
        with:
          commit_limit: 5
          extract_command: grep -oE 'chore|refactor'
          pretty: true
          key_variable: debug_result
          debug: true

      - name: Print Debug Test Output
        run: |
          echo "Debug mode test completed"
          echo "Result: ${{ steps.debug_test.outputs.value_variable }}"

      - name: Test Custom Timeout
        id: timeout_test
        uses: ./
        with:
          commit_limit: 10
          extract_command: grep -oE 'feat|fix|chore'
          pretty: true
          key_variable: timeout_result
          timeout: 60

      - name: Print Timeout Test Output
        run: |
          echo "Timeout test completed"
          echo "Result: ${{ steps.timeout_test.outputs.value_variable }}"

  ci-result:
    name: CI Result
    if: always()
    needs:
      - unit-test
      - build-and-push-docker
      - test-action
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
