name: Smoke Test (Released Action)

on:
  workflow_dispatch:
    inputs:
      run:
        description: 'workflow run'
        required: true
        default: 'true'
  workflow_run:
    workflows: ["Create release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  smoke-test-default:
    name: Smoke Test (Default)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Extract Commit Info (default)
        id: extract-default
        uses: somaz94/commit-info-extractor@v1
        with:
          commit_limit: '5'

      - name: Verify Default Output
        run: |
          cat <<'EOF'
          key_variable=${{ steps.extract-default.outputs.key_variable }}
          value_variable=${{ steps.extract-default.outputs.value_variable }}
          EOF
          echo "PASS: default extraction completed"

  smoke-test-pattern:
    name: Smoke Test (Pattern)
    runs-on: ubuntu-latest
    needs: [smoke-test-default]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Extract with Pattern
        id: extract-pattern
        uses: somaz94/commit-info-extractor@v1
        with:
          commit_limit: '10'
          extract_pattern: '(feat|fix|docs):'
          output_format: 'json'

      - name: Verify Pattern Output
        run: |
          cat <<'EOF'
          match_count=${{ steps.extract-pattern.outputs.match_count }}
          EOF
          echo "PASS: pattern extraction completed"

  smoke-test-options:
    name: Smoke Test (Custom Options)
    runs-on: ubuntu-latest
    needs: [smoke-test-pattern]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Extract with Custom Options
        id: extract-custom
        uses: somaz94/commit-info-extractor@v1
        with:
          commit_limit: '3'
          pretty: 'true'
          key_variable: 'DEPLOY_ENV'
          output_format: 'csv'
          debug: 'true'

      - name: Verify Custom Output
        run: |
          cat <<'EOF'
          key_variable=${{ steps.extract-custom.outputs.key_variable }}
          EOF
          echo "PASS: custom options completed"
