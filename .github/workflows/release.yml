name: Create release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: "Release"
    runs-on: ubuntu-latest
    steps:
      - name: "Check-out"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get previous semver tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | grep -B1 "^${CURRENT_TAG}$" | head -n1)
          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            PREVIOUS_TAG=""
          fi
          echo "tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append full changelog link
        if: steps.prev_tag.outputs.tag != ''
        run: |
          echo "" >> RELEASE.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.tag }}...${{ github.ref_name }}" >> RELEASE.md

      - name: "Create GitHub release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Update major version tag"
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          MAJOR_VERSION: ${{ github.ref_name }}
        run: |
          git switch main
          git fetch --tags
          MAJOR_VERSION="${CURRENT_TAG%%.*}"
          COMMIT_SHA=$(git rev-parse ${{ github.sha }})
          echo "Current commit SHA: $COMMIT_SHA"
          echo "Updating $MAJOR_VERSION to point to $CURRENT_TAG at commit $COMMIT_SHA"
          echo "MAJOR_VERSION=${MAJOR_VERSION}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=${COMMIT_SHA}" >> "$GITHUB_ENV"
          if git tag -l | grep -q "^${MAJOR_VERSION}$"; then
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Delete old major version tag
        if: env.TAG_EXISTS == 'true'
        uses: somaz94/go-git-commit-action@v1
        with:
          user_email: 'action@github.com'
          user_name: 'GitHub Action'
          tag_name: ${{ env.MAJOR_VERSION }}
          delete_tag: true
          github_token: ${{ secrets.PAT_TOKEN }}

      - name: Create new major version tag
        uses: somaz94/go-git-commit-action@v1
        with:
          user_email: 'action@github.com'
          user_name: 'GitHub Action'
          tag_name: ${{ env.MAJOR_VERSION }}
          tag_reference: ${{ env.COMMIT_SHA }}
          github_token: ${{ secrets.PAT_TOKEN }}
